<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        /* 1. RESET & BACKGROUND SETUP */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Times New Roman", Times, serif; /* Matching the serif style */
        }

        body {
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: flex-end; /* Aligns the login box to the right */
            align-items: center;
            padding-right: 10%; /* Spacing from the right edge */
            
            /* Replace the URL below with your actual image file */
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), 
                        url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }

        /* 2. THE GLASS LOGIN BOX */
        .login-card {
            background: rgba(15, 23, 42, 0.7); /* Dark semi-transparent blue */
            backdrop-filter: blur(10px);        /* Frosted glass effect */
            -webkit-backdrop-filter: blur(10px);
            width: 380px;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            color: white;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 42px;
            margin-bottom: 30px;
            font-weight: normal;
        }

        /* 3. INPUT STYLING */
        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 50px; /* Pill shape */
            border: none;
            outline: none;
            font-size: 14px;
            text-align: center;
        }

        input::placeholder {
            color: #666;
            font-style: italic;
        }

        /* 4. BUTTONS & LINKS */
        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
        }

        .login-btn {
            background-color: #003380; /* Navy blue button */
            color: white;
            padding: 8px 35px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        .login-btn:hover {
            background-color: #0044aa;
        }

        .signup-text {
            font-size: 12px;
            color: white;
            text-align: right;
            line-height: 1.4;
        }

        .signup-text span {
            color: #ff4d4d; /* Reddish color for "sign up" */
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>login</h1>
        
        <div class="input-group">
            <input type="email" placeholder="Enter your email">
        </div>

        <div class="input-group">
            <input type="password" placeholder="Enter your password">
        </div>

        <div class="actions">
            <a href="select_book.html"><button class="login-btn">Login</button></a>
            <div class="signup-text">
                you don't have account?<br>
                <span>sign up</span>
            </div>
        </div>
    </div>

</body>
</html>
