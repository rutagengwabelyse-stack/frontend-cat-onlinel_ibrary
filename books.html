<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Selection List</title>
    <style>
        /* 1. RESET & BACKGROUND */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #051024; /* Consistent dark navy */
            font-family: "Times New Roman", Times, serif;
        }

        /* 2. LIST CONTAINER */
        .book-list {
            display: flex;
            flex-direction: column; /* Stacks buttons vertically */
            gap: 30px;              /* Spacing between the buttons */
            width: 80%;             /* Responsive width */
            max-width: 700px;       /* Limits how wide buttons can get */
        }

        /* 3. PILL BUTTON STYLING */
        .book-item {
            background-color: #ffffff;
            color: #000000;
            font-size: 24px;
            padding: 25px 20px;
            text-align: center;
            border-radius: 100px; /* Perfect pill shape */
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        /* 4. HOVER INTERACTION */
        .book-item:hover {
            background-color: #f8f8f8;
            transform: scale(1.02); /* Subtle pop effect */
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
        }

        .book-item:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="book-list">
        <a href="alchemist.html"><button class="book-item">The Alchemist</button></a>
       <a href="sapiens.html"><button class="book-item">Sapiens</button></a>
       <a href="long_walk.html"> <button class="book-item">Long Walk to Freedom</button></a>
    </div>

</body>
</html>
